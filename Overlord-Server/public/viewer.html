<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Overlord 2.0 Viewer</title>
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="/assets/main.css" />
  </head>
  <body class="unified-viewer">
    <div class="viewer-layout">
      <aside id="sidePanel" class="side-panel"></aside>
      <div class="viewer-main">
        <header class="viewer-commandbar">
          <span class="viewer-id">ID <b id="viewerClientId">------------</b></span>
          <nav aria-label="Viewer mode">
            <button data-mode="webcam"><i class="fa-solid fa-camera"></i> Webcam</button>
            <button data-mode="desktop"><i class="fa-solid fa-display"></i> Desktop</button>
            <button data-mode="split"><i class="fa-solid fa-table-columns"></i> Split H</button>
            <button data-mode="split-v"><i class="fa-solid fa-table-rows"></i> Split V</button>
            <button data-mode="pip" id="pipBtn"><i class="fa-solid fa-clone"></i> PiP</button>
          </nav>
          <div id="pipCornerPicker" class="pip-corner-picker" style="display:none">
            <button data-corner="tl" class="pip-corner" title="Top left"><i class="fa-solid fa-arrow-up-left"></i></button>
            <button data-corner="tr" class="pip-corner" title="Top right"><i class="fa-solid fa-arrow-up-right"></i></button>
            <button data-corner="bl" class="pip-corner" title="Bottom left"><i class="fa-solid fa-arrow-down-left"></i></button>
            <button data-corner="br" class="pip-corner is-active" title="Bottom right"><i class="fa-solid fa-arrow-down-right"></i></button>
          </div>
          <span id="viewerCapability" class="viewer-capability"><i class="fa-solid fa-video-slash"></i> checking camera</span>
        </header>
        <main id="viewerPanels" class="viewer-panels" data-mode="webcam">
          <section class="viewer-panel viewer-panel-webcam"><iframe id="viewerWebcam" title="Webcam"></iframe></section>
          <div id="viewerDivider" class="viewer-divider"></div>
          <section class="viewer-panel viewer-panel-desktop"><iframe id="viewerDesktop" title="Remote desktop"></iframe></section>
        </main>
      </div>
    </div>
    <script type="module" src="/assets/viewer.js"></script>
  </body>
</html>
