<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Overlord 2.0 Viewer</title>
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="/assets/main.css" />
  </head>
  <body class="unified-viewer">
    <div class="viewer-layout">
      <aside id="sidePanel" class="side-panel"></aside>
      <div class="viewer-main">
        <header class="viewer-commandbar">
          <span class="viewer-id">ID <b id="viewerClientId">------------</b></span>
          <nav aria-label="Viewer mode">
            <button data-mode="webcam"><i class="fa-solid fa-camera"></i> Webcam</button>
            <button data-mode="desktop"><i class="fa-solid fa-display"></i> Desktop</button>
            <button data-mode="split"><i class="fa-solid fa-table-columns"></i> Split</button>
            <button data-mode="pip"><i class="fa-solid fa-clone"></i> PiP</button>
          </nav>
          <span id="viewerCapability" class="viewer-capability"><i class="fa-solid fa-video-slash"></i> checking camera</span>
        </header>
        <div id="viewerWebcamBar" class="viewer-webcam-bar" hidden>
          <span class="viewer-webcam-bar-label"><i class="fa-solid fa-camera"></i> Webcam</span>
          <button type="button" id="viewerCamStart" class="viewer-cam-btn viewer-cam-btn-primary" title="Start webcam">
            <i class="fa-solid fa-play"></i> Start
          </button>
          <button type="button" id="viewerCamStop" class="viewer-cam-btn" title="Stop webcam">
            <i class="fa-solid fa-stop"></i> Stop
          </button>
          <span id="viewerCamStatus" class="viewer-cam-status">
            <i class="fa-solid fa-circle text-slate-400"></i>
            <span>Idle</span>
          </span>
          <span class="viewer-cam-fps">FPS <b id="viewerCamFps">--</b></span>
          <div class="viewer-cam-settings-wrap">
            <button type="button" id="viewerCamSettingsBtn" class="viewer-cam-btn" aria-haspopup="true" aria-expanded="false">
              <i class="fa-solid fa-sliders"></i> Settings
              <i class="fa-solid fa-chevron-down viewer-cam-chevron"></i>
            </button>
            <div id="viewerCamSettingsMenu" class="viewer-cam-settings-menu" hidden role="menu">
              <div class="viewer-cam-settings-section">
                <div class="viewer-cam-settings-title">Camera</div>
                <div class="viewer-cam-field">
                  <label for="viewerCamDevice">Device</label>
                  <select id="viewerCamDevice"></select>
                  <button type="button" id="viewerCamRefresh" class="viewer-cam-btn viewer-cam-icon" title="Refresh cameras">
                    <i class="fa-solid fa-rotate"></i>
                  </button>
                </div>
              </div>
              <div class="viewer-cam-settings-section">
                <div class="viewer-cam-settings-title">Video</div>
                <div class="viewer-cam-field">
                  <label for="viewerCamResolution">Resolution</label>
                  <select id="viewerCamResolution">
                    <option value="360">360p</option>
                    <option value="480" selected>480p</option>
                    <option value="720">720p</option>
                    <option value="1080">1080p</option>
                    <option value="-1">Native</option>
                  </select>
                </div>
                <div class="viewer-cam-field">
                  <label for="viewerCamMode">Mode</label>
                  <select id="viewerCamMode">
                    <option value="off" selected>Standard</option>
                    <option value="p2p">Direct (P2P)</option>
                    <option value="relayed">Relayed</option>
                  </select>
                </div>
                <div class="viewer-cam-field">
                  <label for="viewerCamMaxFps">Max FPS</label>
                  <select id="viewerCamMaxFps">
                    <option value="15">15 fps</option>
                    <option value="30" selected>30 fps</option>
                    <option value="60">60 fps</option>
                  </select>
                </div>
                <label class="viewer-cam-check">
                  <input type="checkbox" id="viewerCamH264" checked /> H.264
                </label>
              </div>
            </div>
          </div>
        </div>
        <main id="viewerPanels" class="viewer-panels" data-mode="webcam">
          <section class="viewer-panel viewer-panel-webcam" id="viewerWebcamPanel">
            <iframe id="viewerWebcam" title="Webcam"></iframe>
          </section>
          <div id="viewerDivider" class="viewer-divider"></div>
          <section class="viewer-panel viewer-panel-desktop" id="viewerDesktopPanel">
            <iframe id="viewerDesktop" title="Remote desktop"></iframe>
            <div id="viewerPipOverlay" class="viewer-pip-overlay" hidden>
              <div class="pip-toolbar" data-pip-toolbar>
                <span class="pip-drag-label" title="Drag to move">
                  <i class="fa-solid fa-arrows-up-down-left-right"></i>
                </span>
                <div class="pip-snap-group" title="Snap position">
                  <button type="button" data-pip-snap="tl" title="Top Left">TL</button>
                  <button type="button" data-pip-snap="tr" title="Top Right">TR</button>
                  <button type="button" data-pip-snap="bl" title="Bottom Left">BL</button>
                  <button type="button" data-pip-snap="br" title="Bottom Right">BR</button>
                </div>
                <div class="pip-actions">
                  <button type="button" data-pip-pin id="webcamPinBtn" title="Pin / Lock Position" aria-pressed="false">
                    <i class="fa-solid fa-thumbtack"></i>
                  </button>
                  <button type="button" data-pip-close id="webcamCloseBtn" title="Close Webcam Overlay">
                    <i class="fa-solid fa-xmark"></i>
                  </button>
                </div>
              </div>
              <span class="pip-lock-badge" data-pip-lock-badge hidden title="Position locked">
                <i class="fa-solid fa-lock"></i>
              </span>
              <iframe id="viewerPipWebcam" title="Webcam overlay"></iframe>
              <div class="pip-resize-handle" data-pip-resize title="Resize"></div>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script type="module" src="/assets/viewer.js"></script>
  </body>
</html>
