<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Overlord 2.0 — Live Work Progress</title><style>:root{color-scheme:dark;--bg:#09090d;--fg:#d7f9e9;--dim:#728079;--m:#ff4fd8;--g:#75f59a;--c:#59d5ff;--y:#ffd166}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.45 "JetBrains Mono",Consolas,monospace;padding:28px}main{max-width:920px;margin:auto;border:1px solid #27312c;padding:22px;box-shadow:0 0 40px #000}h1{font-size:16px;margin:0 0 5px;color:var(--m)}.meta{color:var(--dim);font-size:12px}.bar{height:8px;border:1px solid #31443a;margin:20px 0;background:#101814}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--g),var(--c));transition:width .35s ease}.spark{color:var(--m);letter-spacing:1px;animation:scan 1.1s steps(2,end) infinite}@keyframes scan{50%{opacity:.35}}section{border-top:1px dashed #34413a;padding-top:14px;margin-top:14px}.row{display:grid;grid-template-columns:100px 1fr 80px;gap:10px;padding:6px 0}.done{color:var(--g)}.active{color:var(--c)}.pending{color:var(--dim)}.fail{color:#ff6b6b}@media(prefers-reduced-motion:reduce){.spark{animation:none}}</style></head><body><main><h1>OVERLORD 2.0 // BUILD TELEMETRY</h1><div id="meta" class="meta">CONNECTING…</div><div class="bar"><i id="bar"></i></div><div id="spark" class="spark"></div><section id="tasks"></section><section><div class="meta">LATEST EVENT</div><div id="event">Awaiting data…</div></section></main><script>const e=document.getElementById('meta'),b=document.getElementById('bar'),s=document.getElementById('spark'),t=document.getElementById('tasks'),v=document.getElementById('event');async function load(){try{let d=await fetch('progress.json?'+Date.now()).then(r=>r.json()),n=d.tasks.length,c=d.tasks.filter(x=>x.status==='done').length,p=d.tasks.filter(x=>x.status==='active').length;e.textContent=`VERSION ${d.version}  |  ELAPSED ${d.elapsed}  |  ${c}/${n} MILESTONES COMPLETE`;b.style.width=`${n?100*c/n:0}%`;s.textContent=`[${'#'.repeat(c)}${'>'.repeat(p)}${'.'.repeat(Math.max(0,n-c-p))}]`;t.innerHTML=d.tasks.map(x=>`<div class="row ${x.status}"><span>[${x.status==='done'?'OK':x.status==='active'?'RUN':'..'}]</span><span>${x.name}</span><span>${x.detail||''}</span></div>`).join('');v.textContent=d.event}catch(err){e.textContent='TRACKER WAITING FOR STATUS FILE'}}load();setInterval(load,1500)</script></body></html>
